# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.
 
# Basic Site Settings
locale                   : "en-US"
site_theme               : "air"
title                    : "Joseph White"
title_separator          : "-"
name                     : &name "Joseph White"
description              : &description "Joseph White's academic and professional portfolio"
url                      : https://white-joseph.github.io
baseurl                  : ""
repository               : "white-joseph/white-joseph.github.io"
 
# Site Author
author:
  avatar           : "profile.jpg"
  name             : "Joseph White"
  bio              : "Economics M.A. student at Miami University."
  location         : "Worthington, OH"
  employer         : "Miami University"
  uri              :
  email            : "whitejf@miamioh.edu"
  github           : "white-joseph"
  linkedin         : "josephfranciswhite"
 
# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Working Papers'
  conferences:
    title: 'Works in Progress'
 
# Site Settings
teaser                   :
words_per_minute         : 160
future                   : true
read_more                : "disabled"
atom_feed:
  hide                   : false
  path                   :
 
# SEO Related
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :
 
# Social Sharing
twitter:
  username               : &twitter
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 :
og_description           :
social:
  type                   :
  name                   :
  links:
 
# Analytics
analytics:
  provider               : "false"
  google:
    tracking_id          :
 
# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
 
# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
 
# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
 
# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: false
 
# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed
 
# Outputting
permalink: /:categories/:title/
timezone: America/New_York
 
# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
 
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
 
# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
 
# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development